<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <header class="bg-base-100 shadow-sm px-4">
        <div class="navbar max-w-7xl mx-auto flex flex-col md:flex-row gap-4 py-3">
            <div class="flex-1 flex items-center gap-2">
                <div class="w-8 h-8 flex-shrink-0">
                    <img class="w-full h-full object-contain" src="./assets/github-logo.png" alt="github logo">
                </div>
                <div>
                    <a class="btn btn-ghost text-xl font-bold whitespace-nowrap">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex flex-row items-center gap-2 w-full md:w-auto">
                <label class="input input-bordered flex items-center gap-2 flex-1 md:w-64">
                    <svg class="h-4 w-4 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchText" class="grow" type="search" required placeholder="Search" />
                </label>

                <button id="searchBtn" class="fiterBtn btn btn-primary whitespace-nowrap"><i
                        class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </header>


    <main class="bg-slate-50 min-h-screen p-4 md:p-8">
        <div class="max-w-7xl mx-auto space-y-6">

            <!-- filering buttons -->
            <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex gap-2">
                <button id="allIssuesBtn"
                    class="fiterBtn btn btn-sm md:btn-md bg-[#4f00ff] hover:bg-[#3f00cc] text-white border-none px-8">All</button>
                <button id="openIssuesBtn"
                    class="fiterBtn btn btn-sm md:btn-md btn-ghost border border-slate-200 px-8">Open</button>

                <button id="closeIssuesBtn"
                    class="fiterBtn btn btn-sm md:btn-md btn-ghost border border-slate-200 px-8">Closed</button>
            </div>

            <!-- issues container -->
            <div
                class="bg-white p-6 rounded-t-xl border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">

                <div class="flex items-center gap-4">
                    <div
                        class="w-12 h-12 bg-indigo-100 text-[#4f00ff] rounded-full flex items-center justify-center flex-shrink-0">
                        <img class="w-8/12 h-8/12" src="./assets/Aperture.png" alt=" logo">
                    </div>
                    <div>
                        <h2 id="totalIssuCount" class="text-xl font-bold text-slate-800"></h2>
                        <p class="text-slate-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-sm font-medium">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                        <span class="text-slate-600">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-violet-500 rounded-full"></span>
                        <span class="text-slate-600">Closed</span>
                    </div>
                </div>
            </div>

            <!-- card container -->
            <div id="issuesCardContainer"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 bg-gray-50 p-4  shadow-2xl border-x border-b border-slate-100 rounded-b-xl">

                <!-- card -->

            </div>
        </div>

        <!-- modal container -->
        <div id="modalContainer">

        </div>

    </main>
    <script src="./script.js"></script>
</body>

</html>
