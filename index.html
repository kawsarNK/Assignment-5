<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4"></body>

<div class="card w-full max-auto bg-base-100 shadow-xl border border-slate-100" style="max-width: 440px;">
    <div class="card-body items-center text-center p-10">

        <div class="mb-4">
            <img src="./assets/github-logo.png" alt="github-logo" class="w-16 h-16 text-slate-900">
        </div>

        <h2 class="card-title text-2xl font-bold text-slate-800">GitHub Issues Tracker</h2>
        <p class="text-slate-500 text-sm mb-6">Sign in to manage your issues</p>

        <form class="w-full text-left">
            <div class="form-control w-full mb-4">
                <label class="label p-0 mb-2">
                    <span class="label-text font-semibold text-slate-700">Username</span>
                </label>
                <input id="userName-input" type="text" placeholder="Enter Username"
                    class="input input-bordered w-full bg-white focus:border-indigo-600 focus:outline-none" />
                <label class="label p-0 mt-1">
                    <span class="label-text-alt text-indigo-600 font-medium">Default: admin</span>
                </label>
            </div>

            <div class="form-control w-full mb-6">
                <label class="label p-0 mb-2">
                    <span class="label-text font-semibold text-slate-700">Password</span>
                </label>
                <input id="pin-input" type="password" placeholder="Enter Password"
                    class="input input-bordered w-full bg-white focus:border-indigo-600 focus:outline-none" />
                <label class="label p-0 mt-1">
                    <span class="label-text-alt text-indigo-600 font-medium">Default: admin123</span>
                </label>
            </div>

            <button id="signIn-btn" class="btn bg-[#4f00ff] hover:bg-[#3f00cc] text-white w-full border-none normal-case text-lg h-12">
                Sign In
            </button>
        </form>

        <div class="divider text-slate-400 text-xs my-6">OR</div>

        <div class="w-full">
            <p class="text-slate-400 text-xs mb-3">Demo Credentials:</p>
            <div class="bg-slate-50 rounded-lg p-4 border border-slate-100">
                <p class="text-slate-700 text-sm">
                    <span class="font-bold">Username:</span> admin
                </p>
                <p class="text-slate-700 text-sm">
                    <span class="font-bold">Password:</span> admin123
                </p>
            </div>
        </div>

    </div>
</div>

<script src="./login.js"></script>
</body>

</html>
